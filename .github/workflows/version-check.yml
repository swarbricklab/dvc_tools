name: Version check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify pyproject.toml and dt/__init__.py versions agree
        run: |
          set -euo pipefail

          PYPROJECT_VERSION=$(grep '^version' pyproject.toml | head -1 | cut -d'"' -f2)
          INIT_VERSION=$(grep '^__version__' dt/__init__.py | head -1 | cut -d'"' -f2)

          echo "pyproject.toml version: ${PYPROJECT_VERSION}"
          echo "dt/__init__.py version: ${INIT_VERSION}"

          if [[ -z "$PYPROJECT_VERSION" || -z "$INIT_VERSION" ]]; then
            echo "::error::Could not parse version from pyproject.toml or dt/__init__.py"
            exit 1
          fi

          if [[ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]]; then
            echo "::error::Version mismatch: pyproject.toml=${PYPROJECT_VERSION} but dt/__init__.py=${INIT_VERSION}. Both must be bumped together."
            exit 1
          fi

      - name: Verify version was bumped relative to base branch
        run: |
          set -euo pipefail

          BASE_REF="origin/${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

          PR_VERSION=$(grep '^version' pyproject.toml | head -1 | cut -d'"' -f2)
          BASE_VERSION=$(git show "${BASE_REF}:pyproject.toml" | grep '^version' | head -1 | cut -d'"' -f2 || true)

          echo "Base (${{ github.base_ref }}) version: ${BASE_VERSION:-<missing>}"
          echo "PR version:                            ${PR_VERSION}"

          if [[ -z "$PR_VERSION" ]]; then
            echo "::error file=pyproject.toml::Could not parse version from pyproject.toml"
            exit 1
          fi

          if [[ "$PR_VERSION" == "$BASE_VERSION" ]]; then
            echo "::error file=pyproject.toml::Version in pyproject.toml (${PR_VERSION}) must be bumped relative to ${{ github.base_ref }} so that the published image tag is unique."
            exit 1
          fi

          # Ensure new version is strictly greater (PEP 440 ordering via packaging).
          python - <<EOF
          from packaging.version import Version
          pr = Version("${PR_VERSION}")
          base = Version("${BASE_VERSION}") if "${BASE_VERSION}" else None
          if base is not None and pr <= base:
              raise SystemExit(
                  f"::error file=pyproject.toml::PR version {pr} must be greater than base version {base}"
              )
          print(f"OK: {pr} > {base}")
          EOF
