name: Deploy to NCI

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_REPO: ghcr.io/swarbricklab/dt
  REMOTE_BUILDER_NAME: gcp-builder
  REMOTE_BUILDER_HOST: absconda-builder
  GCP_REGION: australia-southeast1
  GCP_ZONE: australia-southeast1-a

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: [self-hosted, qxub-runner]
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}

    env:
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Debug GCP identity
        run: |
          echo "::group::gcloud auth list"
          gcloud auth list
          echo "::endgroup::"
          echo "::group::gcloud config list"
          gcloud config list
          echo "::endgroup::"
          echo "::group::active account email"
          gcloud config get-value account
          echo "::endgroup::"
          echo "::group::IAP tunnel access check (instance IAM)"
          gcloud compute instances get-iam-policy absconda-builder \
            --zone=australia-southeast1-a --project="$GCP_PROJECT" \
            --format=json 2>&1 || true
          echo "::endgroup::"
          echo "::group::Project IAM bindings for active SA"
          ACTIVE_SA=$(gcloud config get-value account)
          gcloud projects get-iam-policy "$GCP_PROJECT" \
            --flatten='bindings[].members' \
            --filter="bindings.members:${ACTIVE_SA}" \
            --format='value(bindings.role)' 2>&1 || true
          echo "::endgroup::"
          echo "::group::Direct IAP tunnel probe (active SA)"
          # Start the instance first (idempotent) and then try to open the tunnel
          # for 5 seconds to surface the real error before absconda runs.
          gcloud compute instances start absconda-builder \
            --zone=australia-southeast1-a --project="$GCP_PROJECT" 2>&1 | tail -5 || true
          timeout 15s gcloud compute start-iap-tunnel absconda-builder 22 \
            --local-host-port=localhost:2222 \
            --zone=australia-southeast1-a --project="$GCP_PROJECT" \
            --verbosity=info 2>&1 | tail -30 || true
          echo "::endgroup::"
          echo "::group::Attached SA tunnel probe (grunner-sa)"
          # Temporarily switch to the runner VM's attached SA to see if IT can tunnel.
          ACTIVATE_SA=$(gcloud auth list --format='value(account)' --filter='-account:***' | head -1)
          if [[ -n "$ACTIVATE_SA" ]]; then
            echo "Activating $ACTIVATE_SA"
            gcloud config set account "$ACTIVATE_SA" 2>&1 || true
            timeout 15s gcloud compute start-iap-tunnel absconda-builder 22 \
              --local-host-port=localhost:2223 \
              --zone=australia-southeast1-a --project="$GCP_PROJECT" \
              --verbosity=info 2>&1 | tail -30 || true
            # Switch back
            gcloud config set account "$(gcloud auth list --format='value(account)' --filter='-account:'"$ACTIVATE_SA" | head -1)" 2>&1 || true
          else
            echo "(no second account to test)"
          fi
          echo "::endgroup::"

      - name: Resolve OS Login username
        run: |
          GCP_OS_LOGIN_USER=$(gcloud compute os-login describe-profile \
            --format='value(posixAccounts[0].username)')
          echo "GCP_OS_LOGIN_USER=$GCP_OS_LOGIN_USER" >> "$GITHUB_ENV"

      - name: Install absconda
        run: |
          python3 -m pip install --user git+https://github.com/swarbricklab/absconda.git
          USER_BIN=$(python3 -c 'import site, os; print(os.path.join(site.getuserbase(), "bin"))')
          echo "$USER_BIN" >> "$GITHUB_PATH"
      - name: Configure absconda
        run: |
          absconda config set registry ghcr.io
          absconda config set organization swarbricklab
          absconda config set gcp_project "$GCP_PROJECT"
          absconda config set gcp_region "$GCP_REGION"
          absconda config set gcp_zone "$GCP_ZONE"
          absconda config set default_remote_builder "$REMOTE_BUILDER_NAME"

          BUILDER="remote_builders.${REMOTE_BUILDER_NAME}"
          absconda config set "${BUILDER}.host" "$REMOTE_BUILDER_HOST"
          absconda config set "${BUILDER}.workspace" /var/lib/absconda
          absconda config set "${BUILDER}.ssh_key" "$HOME/.ssh/google_compute_engine"
          absconda config set "${BUILDER}.ssh_port" 22
          absconda config set "${BUILDER}.project" "$GCP_PROJECT"
          absconda config set "${BUILDER}.zone" "$GCP_ZONE"
          absconda config set "${BUILDER}.user" "$GCP_OS_LOGIN_USER"
          absconda config set "${BUILDER}.ssh_options" \
            "[\"-o\",\"CheckHostIP=no\",\"-o\",\"StrictHostKeyChecking=accept-new\",\"-o\",\"ProxyCommand=gcloud compute start-iap-tunnel %h %p --listen-on-stdin --zone=${GCP_ZONE} --project=${GCP_PROJECT} --verbosity=warning\",\"-o\",\"ProxyUseFdpass=no\"]"
          absconda config set "${BUILDER}.start_command" \
            "[\"gcloud\",\"compute\",\"instances\",\"start\",\"${REMOTE_BUILDER_HOST}\",\"--zone=${GCP_ZONE}\",\"--project=${GCP_PROJECT}\"]"
          absconda config set "${BUILDER}.stop_command" \
            "[\"gcloud\",\"compute\",\"instances\",\"stop\",\"${REMOTE_BUILDER_HOST}\",\"--zone=${GCP_ZONE}\",\"--project=${GCP_PROJECT}\"]"
          absconda config set "${BUILDER}.health_command" \
            "[\"gcloud\",\"compute\",\"instances\",\"describe\",\"${REMOTE_BUILDER_HOST}\",\"--zone=${GCP_ZONE}\",\"--project=${GCP_PROJECT}\",\"--format=value(status)\"]"

          absconda config list

      - name: Resolve image tag from project version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | cut -d'"' -f2)
          echo "IMAGE_TAG=$VERSION" >> "$GITHUB_ENV"
          echo "image_tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish image via remote builder
        run: |
          absconda publish \
            --dockerfile docker/Dockerfile \
            --repository "$IMAGE_REPO" \
            --tag "$IMAGE_TAG" \
            --env-name dt \
            --remote-builder "$REMOTE_BUILDER_NAME" \
            --remote-off

  deploy:
    needs: publish
    runs-on: [self-hosted, qxub-runner]
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}
      IMAGE_TAG: ${{ needs.publish.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve OS Login username
        run: |
          GCP_OS_LOGIN_USER=$(gcloud compute os-login describe-profile \
            --format='value(posixAccounts[0].username)')
          echo "GCP_OS_LOGIN_USER=$GCP_OS_LOGIN_USER" >> "$GITHUB_ENV"

      - name: Upgrade qxub to latest
        run: /opt/qxub-venv/bin/pip install --force-reinstall --no-deps git+https://github.com/swarbricklab/qxub.git

      - name: Fetch GHCR token from Secret Manager
        run: |
          GHCR_TOKEN=$(gcloud secrets versions access latest \
            --secret=absconda-github-token \
            --project="$GCP_PROJECT")
          CRED_FILE=$(mktemp)
          echo "$GHCR_TOKEN" > "$CRED_FILE"
          chmod 600 "$CRED_FILE"
          echo "GHCR_CRED_FILE=$CRED_FILE" >> "$GITHUB_ENV"

      - name: Deploy to NCI
        run: |
          IMAGE_REF="${IMAGE_REPO}:${IMAGE_TAG}"

          qxub exec -v --mod absconda --mem 4GB --resources jobfs=4GB --internet \
            --vars SINGULARITY_DOCKER_USERNAME=swarbricklab,SINGULARITY_DOCKER_PASSWORD=$(cat $GHCR_CRED_FILE) \
            -- \
            absconda deploy "$IMAGE_REF" \
              --commands dt,dvc,gh,aws,daff,qxub \
              --env-dir /opt/conda/envs/dt \
              --shims singularity

          rm -f "$GHCR_CRED_FILE"
