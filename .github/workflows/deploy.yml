name: Deploy to NCI

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_REPO: ghcr.io/swarbricklab/dt
  REMOTE_BUILDER_NAME: gcp-builder
  REMOTE_BUILDER_HOST: absconda-builder
  GCP_REGION: australia-southeast1
  GCP_ZONE: australia-southeast1-a

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: [self-hosted, qxub-runner]
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}

    env:
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve OS Login username
        run: |
          GCP_OS_LOGIN_USER=$(gcloud compute os-login describe-profile \
            --format='value(posixAccounts[0].username)')
          echo "GCP_OS_LOGIN_USER=$GCP_OS_LOGIN_USER" >> "$GITHUB_ENV"

      - name: Install absconda
        run: |
          python3 -m pip install --user git+https://github.com/swarbricklab/absconda.git
          USER_BIN=$(python3 -c 'import site, os; print(os.path.join(site.getuserbase(), "bin"))')
          echo "$USER_BIN" >> "$GITHUB_PATH"
      - name: Configure absconda
        run: |
          absconda config set registry ghcr.io
          absconda config set organization swarbricklab
          absconda config set gcp_project "$GCP_PROJECT"
          absconda config set gcp_region "$GCP_REGION"
          absconda config set gcp_zone "$GCP_ZONE"
          absconda config set default_remote_builder "$REMOTE_BUILDER_NAME"

          BUILDER="remote_builders.${REMOTE_BUILDER_NAME}"
          absconda config set "${BUILDER}.host" "$REMOTE_BUILDER_HOST"
          absconda config set "${BUILDER}.workspace" /var/lib/absconda
          absconda config set "${BUILDER}.ssh_key" "$HOME/.ssh/google_compute_engine"
          absconda config set "${BUILDER}.ssh_port" 22
          absconda config set "${BUILDER}.project" "$GCP_PROJECT"
          absconda config set "${BUILDER}.zone" "$GCP_ZONE"
          absconda config set "${BUILDER}.user" "$GCP_OS_LOGIN_USER"
          absconda config set "${BUILDER}.ssh_options" \
            "[\"-o\",\"CheckHostIP=no\",\"-o\",\"StrictHostKeyChecking=accept-new\",\"-o\",\"ProxyCommand=gcloud compute start-iap-tunnel %h %p --listen-on-stdin --zone=${GCP_ZONE} --project=${GCP_PROJECT} --verbosity=warning\",\"-o\",\"ProxyUseFdpass=no\"]"
          absconda config set "${BUILDER}.start_command" \
            "[\"gcloud\",\"compute\",\"instances\",\"start\",\"${REMOTE_BUILDER_HOST}\",\"--zone=${GCP_ZONE}\",\"--project=${GCP_PROJECT}\"]"
          absconda config set "${BUILDER}.stop_command" \
            "[\"gcloud\",\"compute\",\"instances\",\"stop\",\"${REMOTE_BUILDER_HOST}\",\"--zone=${GCP_ZONE}\",\"--project=${GCP_PROJECT}\"]"
          absconda config set "${BUILDER}.health_command" \
            "[\"gcloud\",\"compute\",\"instances\",\"describe\",\"${REMOTE_BUILDER_HOST}\",\"--zone=${GCP_ZONE}\",\"--project=${GCP_PROJECT}\",\"--format=value(status)\"]"

          absconda config list

      - name: Resolve image tag from project version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | cut -d'"' -f2)
          echo "IMAGE_TAG=$VERSION" >> "$GITHUB_ENV"
          echo "image_tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pre-warm builder SSH
        # Mitigate the IAP/sshd cold-start race: 'gcloud compute instances start'
        # returns when the GCE control plane sees RUNNING, but sshd inside the
        # guest may not be listening yet, so absconda's first remote command
        # (mkdir on the workspace) fails with ssh exit 255. Start the instance
        # and poll SSH until it answers.
        run: |
          gcloud compute instances start "$REMOTE_BUILDER_HOST" \
            --zone="$GCP_ZONE" --project="$GCP_PROJECT" >/dev/null
          for attempt in $(seq 1 30); do
            if gcloud compute ssh "$REMOTE_BUILDER_HOST" \
                 --zone="$GCP_ZONE" --project="$GCP_PROJECT" \
                 --tunnel-through-iap --quiet \
                 --ssh-flag="-o ConnectTimeout=10" \
                 --command="true" >/dev/null 2>&1; then
              echo "Builder SSH ready after $attempt attempt(s)."
              exit 0
            fi
            echo "Attempt $attempt: SSH not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Builder SSH did not become ready in time." >&2
          exit 1

      - name: Pin git deps to commit SHAs
        # The conda env spec installs dvc_tools and qxub from `git+https://...`
        # URLs without a ref. pip's wheel cache keys on URL only, so on a warm
        # builder every subsequent build would silently reuse whichever SHA was
        # built first (we hit this when 0.5.9 still reported `dt --version`
        # 0.5.3). Pin both URLs to a concrete SHA so each build invalidates the
        # cache and the image contains the same code as the workflow run.
        id: pin
        run: |
          DVC_TOOLS_SHA="${GITHUB_SHA}"
          QXUB_SHA=$(gh api repos/swarbricklab/qxub/commits/main --jq .sha)
          echo "dvc_tools SHA: $DVC_TOOLS_SHA"
          echo "qxub SHA:      $QXUB_SHA"
          PINNED=conda/dt.pinned.yaml
          sed -e "s|git+https://github.com/swarbricklab/dvc_tools.git|&@${DVC_TOOLS_SHA}|" \
              -e "s|git+https://github.com/swarbricklab/qxub.git|&@${QXUB_SHA}|" \
              conda/dt.yaml > "$PINNED"
          echo "::group::Pinned env spec"
          cat "$PINNED"
          echo "::endgroup::"
          echo "PINNED_ENV=$PINNED" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish image via remote builder
        run: |
          mkdir -p build-logs
          LOG_FILE="build-logs/publish-${IMAGE_TAG}.log"
          echo "PUBLISH_LOG=$LOG_FILE" >> "$GITHUB_ENV"
          set -o pipefail
          echo "::group::absconda publish output (full log uploaded as artifact)"
          absconda publish \
            --file "$PINNED_ENV" \
            --repository "$IMAGE_REPO" \
            --tag "$IMAGE_TAG" \
            --env-name dt \
            --remote-builder "$REMOTE_BUILDER_NAME" \
            --remote-off 2>&1 | tee "$LOG_FILE"
          status=${PIPESTATUS[0]}
          echo "::endgroup::"
          echo "absconda publish exit status: $status"
          exit "$status"

      - name: Upload publish log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-log-${{ steps.version.outputs.image_tag }}
          path: build-logs/
          retention-days: 30
          if-no-files-found: warn

  deploy:
    needs: publish
    runs-on: [self-hosted, qxub-runner]
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}
      IMAGE_TAG: ${{ needs.publish.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve OS Login username
        run: |
          GCP_OS_LOGIN_USER=$(gcloud compute os-login describe-profile \
            --format='value(posixAccounts[0].username)')
          echo "GCP_OS_LOGIN_USER=$GCP_OS_LOGIN_USER" >> "$GITHUB_ENV"

      - name: Upgrade qxub to latest
        run: /opt/qxub-venv/bin/pip install --force-reinstall --no-deps git+https://github.com/swarbricklab/qxub.git

      - name: Fetch GHCR token from Secret Manager
        run: |
          GHCR_TOKEN=$(gcloud secrets versions access latest \
            --secret=absconda-github-token \
            --project="$GCP_PROJECT")
          GHCR_USERNAME=$(gcloud secrets versions access latest \
            --secret=absconda-github-username \
            --project="$GCP_PROJECT")
          # Runner has no shared filesystem with NCI (qxub SSHes to gadi), so
          # stage the token locally in RUNNER_TEMP and scp to gadi in the next
          # step. Filename is namespaced by GITHUB_RUN_ID to avoid collisions.
          LOCAL_CRED="${RUNNER_TEMP:-/tmp}/dt-ci-ghcr-token-${GITHUB_RUN_ID}"
          REMOTE_CRED=".dt-ci-ghcr-token-${GITHUB_RUN_ID}"
          umask 077
          printf '%s' "$GHCR_TOKEN" > "$LOCAL_CRED"
          chmod 600 "$LOCAL_CRED"
          echo "GHCR_LOCAL_CRED=$LOCAL_CRED" >> "$GITHUB_ENV"
          echo "GHCR_REMOTE_CRED=$REMOTE_CRED" >> "$GITHUB_ENV"
          echo "GHCR_USERNAME=$GHCR_USERNAME" >> "$GITHUB_ENV"

      - name: Stage GHCR token and login script on NCI home
        run: |
          # qxub uses the 'gadi' SSH alias from ~/.ssh/config on the runner to
          # reach NCI. Reuse that alias to scp the credential file and a
          # self-contained login script into the remote user's home (shared
          # with PBS compute nodes). The token never goes through the qsub
          # command line.
          #
          # We build the login script here (with the username and token
          # filename already baked in) to avoid double-quoting hell when
          # passing a shell pipeline through `qxub exec -- bash -c "..."`.
          LOCAL_SCRIPT="${RUNNER_TEMP:-/tmp}/dt-ci-ghcr-login-${GITHUB_RUN_ID}.sh"
          REMOTE_SCRIPT=".dt-ci-ghcr-login-${GITHUB_RUN_ID}.sh"
          cat > "$LOCAL_SCRIPT" <<EOF
          #!/bin/bash
          set -euo pipefail
          TOKEN_FILE="\$HOME/${GHCR_REMOTE_CRED}"
          echo "Token file: \$TOKEN_FILE"
          ls -la "\$TOKEN_FILE"
          echo "Token byte count: \$(wc -c < "\$TOKEN_FILE")"
          singularity remote login \\
            --username "${GHCR_USERNAME}" \\
            --password-stdin \\
            docker://ghcr.io \\
            < "\$TOKEN_FILE"
          EOF
          chmod 700 "$LOCAL_SCRIPT"

          scp -o StrictHostKeyChecking=accept-new \
            "$GHCR_LOCAL_CRED" "$LOCAL_SCRIPT" "gadi:"
          ssh -o StrictHostKeyChecking=accept-new gadi \
            "chmod 600 '$GHCR_REMOTE_CRED' && chmod 700 '$REMOTE_SCRIPT'"

          echo "GHCR_REMOTE_SCRIPT=$REMOTE_SCRIPT" >> "$GITHUB_ENV"
          echo "GHCR_LOCAL_SCRIPT=$LOCAL_SCRIPT" >> "$GITHUB_ENV"

      - name: Refresh Singularity GHCR credentials on NCI compute node
        run: |
          # NCI's singularity reads credentials from ~/.singularity/remote.yaml,
          # not from SINGULARITY_DOCKER_* env vars. Run `singularity remote
          # login` on a compute node (where absconda deploy will later run) so
          # the config is written to the correct ~/.singularity for that
          # context. The script is invoked by absolute path under $HOME so
          # we don't depend on PBS's CWD.
          qxub exec -v --mod singularity --mem 1GB --internet \
            -- \
            bash "\$HOME/$GHCR_REMOTE_SCRIPT"

      - name: Deploy to NCI
        run: |
          IMAGE_REF="${IMAGE_REPO}:${IMAGE_TAG}"

          qxub exec -v --mod absconda --mem 4GB --resources jobfs=4GB --internet \
            -- \
            absconda deploy "$IMAGE_REF" \
              --commands dt,dvc,gh,aws,daff,qxub,qxi,qxtat,qxet,qx \
              --env-dir /opt/conda/envs/dt \
              --shims singularity,pbs

      - name: Clean up GHCR token and login script
        if: always()
        run: |
          rm -f "$GHCR_LOCAL_CRED" "$GHCR_LOCAL_SCRIPT" || true
          if [[ -n "${GHCR_REMOTE_CRED:-}" || -n "${GHCR_REMOTE_SCRIPT:-}" ]]; then
            ssh -o StrictHostKeyChecking=accept-new gadi \
              "rm -f '${GHCR_REMOTE_CRED:-}' '${GHCR_REMOTE_SCRIPT:-}'" || true
          fi
